<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - IFD Santa Clara</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-visual">
            <div class="overlay-gradient"></div>
            <img src="logoifd.png" alt="Logo IFD Santa Clara" class="bg-logo">
        </div>

        <div class="login-form-section">
            <div class="form-content">
                <h1 class="brand-title">IFD</h1>
                <h2 class="sub-brand">SANTA CLARA</h2>
                
                <p class="register-link">¿Aún no tienes una cuenta? <a href="#">Regístrate</a></p>

                <form action="procesar_login.php" method="POST">
                    <div class="input-group">
                        <label for="usuario">Usuario</label>
                        <input type="text" id="usuario" name="usuario" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Mantener la sesión abierta
                        </label>
                        <a href="#" class="forgot-password">¿Has olvidado tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
